#####################################################################
#   Macros
#####################################################################

[gcode_macro NOTIFY]
gcode:
    M117 {params.MSG}
    RESPOND MSG="{params.MSG}"

#──────────────────────────────────────────────────────────────────────
[gcode_macro _INIT_Z_OFFSETS]
# Run once to seed variables.cfg with defaults.
# Three independent 1D tables — total delta = nozzle + temp + surface
#
# Nozzle key: diameter * 100, zero-padded to 3 digits
#   0.15 -> 015, 0.4 -> 040, 1.0 -> 100
#
# Temp key: bucket floor at 20C increments, clamped 180-300
#
# Surface key: S = smooth, T = textured
gcode:
    NOTIFY MSG="Initializing Z offset tables..."
 
    # ── Nozzle base offsets ────────────────────────────
    # Physical geometry delta per nozzle, relative to your
    # baseline (set 040 = 0.00, tune others from there)
    SAVE_VARIABLE VARIABLE=delta_zoff_nozzle_015  VALUE=0.00
    SAVE_VARIABLE VARIABLE=delta_zoff_nozzle_025  VALUE=0.00
    SAVE_VARIABLE VARIABLE=delta_zoff_nozzle_040  VALUE=0.00
    SAVE_VARIABLE VARIABLE=delta_zoff_nozzle_060  VALUE=0.00
    SAVE_VARIABLE VARIABLE=delta_zoff_nozzle_080  VALUE=0.00
    SAVE_VARIABLE VARIABLE=delta_zoff_nozzle_100  VALUE=0.00
    SAVE_VARIABLE VARIABLE=delta_zoff_nozzle_120  VALUE=0.00
    SAVE_VARIABLE VARIABLE=delta_zoff_nozzle_140  VALUE=0.00
 
    # ── Thermal expansion offsets ──────────────────────
    # Hotend assembly expansion per temp bucket
    # Set 200 = 0.00 as baseline, tune others from there
    SAVE_VARIABLE VARIABLE=delta_zoff_temp_180    VALUE=0.00
    SAVE_VARIABLE VARIABLE=delta_zoff_temp_200    VALUE=0.00
    SAVE_VARIABLE VARIABLE=delta_zoff_temp_220    VALUE=0.00
    SAVE_VARIABLE VARIABLE=delta_zoff_temp_240    VALUE=0.00
    SAVE_VARIABLE VARIABLE=delta_zoff_temp_260    VALUE=0.00
    SAVE_VARIABLE VARIABLE=delta_zoff_temp_280    VALUE=0.00
    SAVE_VARIABLE VARIABLE=delta_zoff_temp_300    VALUE=0.00
 
    # ── Surface offsets ────────────────────────────────
    # Physical thickness/texture delta between plate types
    # Set S = 0.00 as baseline, tune T from there
    SAVE_VARIABLE VARIABLE=delta_zoff_surface_s   VALUE=0.00
    SAVE_VARIABLE VARIABLE=delta_zoff_surface_t   VALUE=0.00
 
    NOTIFY MSG="Z offset tables initialized"

#──────────────────────────────────────────────────────────────────────
[gcode_macro SET_Z_OFFSET]
# Set a specific Z offset table entry directly.
# Usage examples:
#   SET_Z_OFFSET TABLE=nozzle NOZZLE=0.4 VALUE=-0.01
#   SET_Z_OFFSET TABLE=temp TEMP=220 VALUE=-0.01
#   SET_Z_OFFSET TABLE=surface SURFACE=T VALUE=0.05
gcode:
    {% if params.TABLE is not defined %}
        { action_raise_error("SET_Z_OFFSET: requires TABLE param (nozzle, temp, or surface)") }
    {% endif %}
 
    {% set table = params.TABLE|lower %}
 
    {% if table == "nozzle" %}
        {% if params.NOZZLE is not defined or params.VALUE is not defined %}
            { action_raise_error("SET_Z_OFFSET TABLE=nozzle: requires NOZZLE and VALUE") }
        {% endif %}
        {% set nozzle_key = "%03d" % (params.NOZZLE|float * 100)|int %}
        {% set key = "delta_zoff_nozzle_" + nozzle_key %}
        SAVE_VARIABLE VARIABLE={key} VALUE={params.VALUE|float}
        NOTIFY MSG="Z offset saved: {key} = {params.VALUE}"
 
    {% elif table == "temp" %}
        {% if params.TEMP is not defined or params.VALUE is not defined %}
            { action_raise_error("SET_Z_OFFSET TABLE=temp: requires TEMP and VALUE") }
        {% endif %}
        {% set bucket = (params.TEMP|float // 20)|int * 20 %}
        {% set bucket = [bucket, 180]|max %}
        {% set bucket = [bucket, 300]|min %}
        {% set key = "delta_zoff_temp_" + bucket|string %}
        SAVE_VARIABLE VARIABLE={key} VALUE={params.VALUE|float}
        NOTIFY MSG="Z offset saved: {key} = {params.VALUE}"
 
    {% elif table == "surface" %}
        {% if params.SURFACE is not defined or params.VALUE is not defined %}
            { action_raise_error("SET_Z_OFFSET TABLE=surface: requires SURFACE (S or T) and VALUE") }
        {% endif %}
        {% set surface = params.SURFACE|lower %}
        {% if surface not in ["s", "t"] %}
            { action_raise_error("SET_Z_OFFSET TABLE=surface: SURFACE must be s or t") }
        {% endif %}
        {% set key = "delta_zoff_surface_" + surface %}
        SAVE_VARIABLE VARIABLE={key} VALUE={params.VALUE|float}
        NOTIFY MSG="Z offset saved: {key} = {params.VALUE}"
 
    {% else %}
        { action_raise_error("SET_Z_OFFSET: TABLE must be nozzle, temp, or surface") }
    {% endif %}
    
#──────────────────────────────────────────────────────────────────────
[gcode_macro _PRINT_VARS]
variable_nozzle: -1.0
variable_extruder_temp: -1.0
variable_bed_type: ""
gcode:

#──────────────────────────────────────────────────────────────────────
[gcode_macro SAVE_Z_OFFSET]
# Run anytime during or after first layer — no args needed.
# Reads current live offset and saves it back to the correct table entry.
# TABLE param selects which table to update (nozzle, temp, or surface).
# Defaults to nozzle since that is the most common tuning target.
# Usage:
#   SAVE_Z_OFFSET               -> saves to nozzle table
#   SAVE_Z_OFFSET TABLE=temp    -> saves to temp table
#   SAVE_Z_OFFSET TABLE=surface -> saves to surface table
gcode:
    {% set nozzle   = printer["gcode_macro _PRINT_VARS"].nozzle|float %}
    {% set temp     = printer["gcode_macro _PRINT_VARS"].extruder_temp|float %}
    {% set bed_type = printer["gcode_macro _PRINT_VARS"].bed_type|string %}
    {% set table    = params.TABLE|default("nozzle")|lower %}
 
    {% if nozzle < 0 or temp < 0 or bed_type == "" %}
        { action_raise_error("SAVE_Z_OFFSET: no active print context - run PRINT_START first") }
    {% endif %}
 
    {% set current_offset = printer.gcode_move.homing_origin.z %}
    {% set svv = printer.save_variables.variables %}
 
    # Reconstruct the other two table values so we can isolate this one
    {% set nozzle_key = "%03d" % (nozzle * 100)|int %}
    {% set e_bucket = (temp // 20)|int * 20 %}
    {% set e_bucket = [e_bucket, 180]|max %}
    {% set e_bucket = [e_bucket, 300]|min %}
 
    {% set z_nozzle  = svv["delta_zoff_nozzle_" + nozzle_key]|default(0.0)|float %}
    {% set z_temp    = svv["delta_zoff_temp_" + e_bucket|string]|default(0.0)|float %}
    {% set z_surface = svv["delta_zoff_surface_" + bed_type]|default(0.0)|float %}
 
    {% if table == "nozzle" %}
        # Isolate nozzle contribution: total - temp - surface
        {% set isolated = current_offset - z_temp - z_surface %}
        {% set key = "delta_zoff_nozzle_" + nozzle_key %}
        SAVE_VARIABLE VARIABLE={key} VALUE={isolated}
        NOTIFY MSG="Saved nozzle Z offset: {key} = {isolated}"
 
    {% elif table == "temp" %}
        # Isolate temp contribution: total - nozzle - surface
        {% set isolated = current_offset - z_nozzle - z_surface %}
        {% set key = "delta_zoff_temp_" + e_bucket|string %}
        SAVE_VARIABLE VARIABLE={key} VALUE={isolated}
        NOTIFY MSG="Saved temp Z offset: {key} = {isolated}"
 
    {% elif table == "surface" %}
        # Isolate surface contribution: total - nozzle - temp
        {% set isolated = current_offset - z_nozzle - z_temp %}
        {% set key = "delta_zoff_surface_" + bed_type %}
        SAVE_VARIABLE VARIABLE={key} VALUE={isolated}
        NOTIFY MSG="Saved surface Z offset: {key} = {isolated}"
 
    {% else %}
        { action_raise_error("SAVE_Z_OFFSET: TABLE must be nozzle, temp, or surface") }
    {% endif %}

#──────────────────────────────────────────────────────────────────────
[gcode_macro _GET_BED_TYPE]
# Maps OrcaSlicer [curr_bed_type] strings to S or T
# Returns via printer["gcode_macro _GET_BED_TYPE"].result
variable_result: "s"
gcode:
    {% if params.BED_TYPE is not defined %}
        { action_raise_error("_GET_BED_TYPE: requires BED_TYPE param") }
    {% endif %}
    {% set t = params.BED_TYPE|string %}
    {% if "Textured" in t or "SuperTack" in t %}
        SET_GCODE_VARIABLE MACRO=_GET_BED_TYPE VARIABLE=result VALUE="'t'"
    {% else %}
        SET_GCODE_VARIABLE MACRO=_GET_BED_TYPE VARIABLE=result VALUE="'s'"
    {% endif %}

#──────────────────────────────────────────────────────────────────────
[gcode_macro PROBE_BED]
# Usage: PROBE_BED BED_TEMP=110 BED_TYPE=T
# BED_TYPE: S = smooth, T = textured
# Heats bed, meshes, saves as bedmesh_{bucket}_{surface}
# Run once per bed temp + surface combo, then SAVE_CONFIG
gcode:
    {% if params.BED_TEMP is not defined or params.BED_TYPE is not defined %}
        { action_raise_error("PROBE_BED: requires BED_TEMP and BED_TYPE params") }
    {% endif %}
 
    {% set bed_temp = params.BED_TEMP|float %}
    {% set surface  = params.BED_TYPE|lower %}
    {% if surface not in ["s", "t"] %}
        { action_raise_error("PROBE_BED: BED_TYPE must be s or t") }
    {% endif %}
 
    {% set bucket = (bed_temp // 20)|int * 20 %}
    {% set bucket = [bucket, 40]|max %}
    {% set bucket = [bucket, 120]|min %}
    {% set profile_name = "bedmesh_" + bucket|string + "_" + surface %}
 
    NOTIFY MSG="PROBE_BED: bed={bed_temp} surface={surface} saving as {profile_name}"
    M190 S{bed_temp}
    G32
    BED_MESH_CALIBRATE
    BED_MESH_PROFILE SAVE={profile_name}
    NOTIFY MSG="Mesh saved as '{profile_name}' - run SAVE_CONFIG to persist"

#──────────────────────────────────────────────────────────────────────
[gcode_macro G32]
gcode:
    NOTIFY MSG="BEGIN MACRO G32"
    SAVE_GCODE_STATE NAME=STATE_G32
    G90

    G28
    
    {% if printer.extruder.temperature >= 150 %} # todo make this always 150 for consistency....
        NOTIFY MSG="PREPPING NOZZLE FOR PROBING"
        ENSURE_MIN_Z
        CLEAN_NOZZLE   
        G1 E-0.25 F300 ; Retract a lil to not ooze
    {% endif %}
    
    G28
    QUAD_GANTRY_LEVEL
    G28 # after QGL baseline changes
    G0 X175 Y175 Z30 F3600
    RESTORE_GCODE_STATE NAME=STATE_G32
    NOTIFY MSG="END MACRO G32"

#──────────────────────────────────────────────────────────────────────
[gcode_macro PRINT_START]
# Slicer start G-code:
#   PRINT_START BED=[bed_temperature_initial_layer_single] EXTRUDER=[nozzle_temperature_initial_layer] NOZZLE=[nozzle_diameter] BED_TYPE=[curr_bed_type]
gcode:
    {% if params.BED is not defined or params.EXTRUDER is not defined or params.NOZZLE is not defined or params.BED_TYPE is not defined %}
        { action_raise_error("PRINT_START: requires BED, EXTRUDER, NOZZLE, and BED_TYPE params") }
    {% endif %}
 
    {% set BED_TEMP      = params.BED|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER|float %}
    {% set NOZZLE        = params.NOZZLE|float %}
 
    # Map bed type string to S or T
    {% set bed_type_raw = params.BED_TYPE|string %}
    {% if "Textured" in bed_type_raw or "SuperTack" in bed_type_raw %}
        {% set SURFACE = "t" %}
    {% else %}
        {% set SURFACE = "s" %}
    {% endif %}
 
    # Store for SAVE_Z_OFFSET to read later
    SET_GCODE_VARIABLE MACRO=_PRINT_VARS VARIABLE=nozzle VALUE={NOZZLE}
    SET_GCODE_VARIABLE MACRO=_PRINT_VARS VARIABLE=extruder_temp VALUE={EXTRUDER_TEMP}
    SET_GCODE_VARIABLE MACRO=_PRINT_VARS VARIABLE=bed_type VALUE="'{SURFACE}'"
 
    # Nozzle key
    {% set nozzle_key = "%03d" % (NOZZLE * 100)|int %}
 
    # Temp bucket
    {% set e_bucket = (EXTRUDER_TEMP // 20)|int * 20 %}
    {% set e_bucket = [e_bucket, 180]|max %}
    {% set e_bucket = [e_bucket, 300]|min %}
 
    # Z offset lookup — three independent tables summed
    {% set svv = printer.save_variables.variables %}
 
    {% set z_nozzle_key  = "delta_zoff_nozzle_"   + nozzle_key %}
    {% set z_temp_key    = "delta_zoff_temp_"      + e_bucket|string %}
    {% set z_surface_key = "delta_zoff_surface_"   + SURFACE %}
 
    {% if z_nozzle_key not in svv %}
        { action_raise_error("PRINT_START: no nozzle Z offset for " + z_nozzle_key + " - run INIT_Z_OFFSETS") }
    {% endif %}
    {% if z_temp_key not in svv %}
        { action_raise_error("PRINT_START: no temp Z offset for " + z_temp_key + " - run INIT_Z_OFFSETS") }
    {% endif %}
    {% if z_surface_key not in svv %}
        { action_raise_error("PRINT_START: no surface Z offset for " + z_surface_key + " - run INIT_Z_OFFSETS") }
    {% endif %}
 
    {% set z_nozzle  = svv[z_nozzle_key]|float %}
    {% set z_temp    = svv[z_temp_key]|float %}
    {% set z_surface = svv[z_surface_key]|float %}
    {% set z_delta   = z_nozzle + z_temp + z_surface %}
 
    # Bed mesh lookup
    {% set b_bucket = (BED_TEMP // 20)|int * 20 %}
    {% set b_bucket = [b_bucket, 40]|max %}
    {% set b_bucket = [b_bucket, 120]|min %}
    {% set mesh_name = "bedmesh_" + b_bucket|string + "_" + SURFACE %}
    {% if mesh_name not in printer.bed_mesh.profiles %}
        { action_raise_error("PRINT_START: no bed mesh for " + mesh_name + " - run PROBE_BED BED_TEMP=" + BED_TEMP|string + " BED_TYPE=" + SURFACE) }
    {% endif %}
 
    NOTIFY MSG="PRINT_START nozzle={NOZZLE} surface={SURFACE} e_bucket={e_bucket} z_nozzle={z_nozzle} z_temp={z_temp} z_surface={z_surface} z_delta={z_delta} mesh={mesh_name}"
 
    G28
    G90
    ENSURE_MIN_Z
    M190 S{BED_TEMP}
    M109 S150
    CLEAN_NOZZLE
    G32
 
    SET_GCODE_OFFSET Z=0
    SET_GCODE_OFFSET Z_ADJUST={z_delta} MOVE=1
    NOTIFY MSG="Z offset delta applied: {z_delta}"
 
    BED_MESH_PROFILE LOAD={mesh_name}
 
    M109 S{EXTRUDER_TEMP}
    PURGE_AND_CLEAN_NOZZLE
 
    NOTIFY MSG="END MACRO PRINT_START"
 
#──────────────────────────────────────────────────────────────────────
[gcode_macro PRINT_END]
gcode:
    NOTIFY MSG="BEGIN MACRO PRINT_END"
    {% set th = printer.toolhead %}
    {% set x_safe = th.position.x + 20 * (1 if th.axis_maximum.x - th.position.x > 20 else -1) %}
    {% set y_safe = th.position.y + 20 * (1 if th.axis_maximum.y - th.position.y > 20 else -1) %}
    {% set z_safe = [th.position.z + 2, th.axis_maximum.z]|min %}
 
    SAVE_GCODE_STATE NAME=STATE_PRINT_END
 
    M400
    G92 E0
    G1 E-5.0 F1800
 
    TURN_OFF_HEATERS
 
    G90
    G0 X{x_safe} Y{y_safe} Z{z_safe} F20000
    G0 X{th.axis_maximum.x//2} Y{th.axis_maximum.y - 2} F3600
    M107
 
    BED_MESH_CLEAR
    RESTORE_GCODE_STATE NAME=STATE_PRINT_END
 
    SET_GCODE_VARIABLE MACRO=_PRINT_VARS VARIABLE=nozzle VALUE=-1.0
    SET_GCODE_VARIABLE MACRO=_PRINT_VARS VARIABLE=extruder_temp VALUE=-1.0
    SET_GCODE_VARIABLE MACRO=_PRINT_VARS VARIABLE=bed_type VALUE="''"
    NOTIFY MSG="END MACRO PRINT_END"

#──────────────────────────────────────────────────────────────────────
[gcode_macro M600]
# Change filament
gcode:
    NOTIFY MSG="BEGIN MACRO M600"
    PAUSE
    UNLOAD_FILAMENT
    NOTIFY MSG="END MACRO M600"

#──────────────────────────────────────────────────────────────────────
[gcode_macro CHOME]
description: Homes XYZ axis only if printer is in a non-homed state
gcode:
  {% if "xyz" not in printer.toolhead.homed_axes %}
    G28
  {% endif %}

#──────────────────────────────────────────────────────────────────────
[gcode_macro FRONT]
description: Moves the toolhead to the front
gcode:
  CHOME
  {% set x_center = printer.toolhead.axis_maximum.x|float / 2.0 %}
  {% set y_center = printer.toolhead.axis_maximum.y|float / 2.0 %}
  G90
  G1 X{x_center} Y10 F7800

#──────────────────────────────────────────────────────────────────────
[gcode_macro _LOGO_PENDING]
gcode:
  SET_LED LED=rgb_light RED=0.15 GREEN=0.5 BLUE=0.75 WHITE=0 INDEX=1

#──────────────────────────────────────────────────────────────────────
[gcode_macro _LOGO_READY]
gcode:
  SET_LED LED=rgb_light RED=0.99 GREEN=0.0 BLUE=0.0 WHITE=0 INDEX=1

#──────────────────────────────────────────────────────────────────────
[gcode_macro _LOGO_OFF]
gcode:
  SET_LED LED=rgb_light RED=0 GREEN=0 BLUE=0 WHITE=0 INDEX=1
  
#──────────────────────────────────────────────────────────────────────
[gcode_macro _HEADLIGHT_ON]
gcode:
  SET_LED LED=rgb_light RED=1 GREEN=1 BLUE=1 WHITE=1.0 INDEX=2 TRANSMIT=0
  SET_LED LED=rgb_light RED=1 GREEN=1 BLUE=1 WHITE=1.0 INDEX=3

#──────────────────────────────────────────────────────────────────────
[gcode_macro _HEADLIGHT_OFF]
gcode:
  SET_LED LED=rgb_light RED=0 GREEN=0 BLUE=0 WHITE=0 INDEX=2 TRANSMIT=0
  SET_LED LED=rgb_light RED=0 GREEN=0 BLUE=0 WHITE=0 INDEX=3
  
#──────────────────────────────────────────────────────────────────────
[gcode_macro UNLOAD_FILAMENT]
description: Unloads filament from toolhead
gcode:
  {% set EXTRUDER_TEMP = params.TEMP|default(230)|int %}
  {% set MIN_TEMP = params.TEMP|default(230)|float * 0.98 %}
  {% set CURRENT_TARGET = printer.extruder.target|float %}
  CHOME
  G91                         ; relative positioning
  G1 Z20                      ; move nozzle upwards
  FRONT                       ; move the toolhead to the front
  {% if EXTRUDER_TEMP != 0 %}
    _LOGO_PENDING
    {% if CURRENT_TARGET < EXTRUDER_TEMP %}
      M104 S{EXTRUDER_TEMP} ; only heat up if the current extruder is not already hot
    {% endif %}
    TEMPERATURE_WAIT SENSOR="extruder" MINIMUM={MIN_TEMP} ; wait for min extrude temp to reach
  {% endif %}
  _LOGO_READY
  M83                         ; set extruder to relative mode
  G1 E10 F300                 ; extrude a little to soften tip
  G1 E-8 F3600                ; quickly retract a small amount to elimate stringing
  G4 P200                     ; pause for a short amount of time
  G1 E-50 F400                ; retract slowly the rest of the way
  G1 E-20 F300
  M400                        ; wait for moves to finish
  M117 Unload Complete!
  _LOGO_OFF

#──────────────────────────────────────────────────────────────────────
[gcode_macro LOAD_FILAMENT]
description: Loads new filament into toolhead
gcode:
  {% set EXTRUDER_TEMP = params.TEMP|default(230)|int %}
  {% set MIN_TEMP = params.TEMP|default(230)|float * 0.98 %}
  {% set CURRENT_TARGET = printer.extruder.target|float %}
  FRONT                       ; move the toolhead to the front
  {% if EXTRUDER_TEMP != 0 %}
    _LOGO_PENDING
    {% if CURRENT_TARGET < EXTRUDER_TEMP %}
      M104 S{EXTRUDER_TEMP} ; only heat up if the current extruder is not already hot
    {% endif %}
    TEMPERATURE_WAIT SENSOR="extruder" MINIMUM={MIN_TEMP} ; wait for min extrude temp to reach
  {% endif %}
  _LOGO_READY
  _HEADLIGHT_ON
  M83                         ; set extruder to relative mode
  G1 E50 F300                 ; extrude slowlyL
  G1 E50 F300
  M400                        ; wait for moves to finish
  M117 Load Complete!
  _LOGO_OFF
  _HEADLIGHT_OFF