#####################################################################
#   Nozzle cleaner Settings
#####################################################################

[servo brush]
pin: EXP3_7
maximum_servo_angle: 180
minimum_pulse_width: 0.0005
maximum_pulse_width: 0.0025
initial_angle: 92

[gcode_macro BRUSH_VARS]
variable_brush_deploy_angle: 0
variable_brush_home_angle: 92
variable_brush_rack_angle: 97
variable_servo_name: "brush"
variable_min_z: 30
variable_center_y: 357.5
variable_brush_center_x: 162
variable_wiper_center_x: 121 # 111 would then be purge pos, +/-5 wiping
gcode: # intentionally empty

[gcode_macro BRUSH_RACK_HOME]
gcode:
    {% set vars = printer["gcode_macro BRUSH_VARS"] %}
    SET_SERVO SERVO={vars.servo_name} ANGLE={vars.brush_rack_angle}
    G4 P500
    SET_SERVO SERVO={vars.servo_name} ANGLE={vars.brush_home_angle}

[gcode_macro BRUSH_DEPLOY]
gcode:
    {% set vars = printer["gcode_macro BRUSH_VARS"] %}
    # Ensure minimum Z so we don't crash
    {% if printer.toolhead.position.z < vars.min_z %}
        G1 Z{vars.min_z} F3000
    {% endif %}
    SET_SERVO SERVO={vars.servo_name} ANGLE={vars.brush_deploy_angle}
    G4 P500

[gcode_macro _WIPE_NOZZLE_PATTERN]
gcode:
    {% set vars = printer["gcode_macro BRUSH_VARS"] %}
    {% set wipe_count = 6 %}
    {% set wipe_speed = 10000 %}
    {% set wipe_min_x = vars.wiper_center_x - 5 %}
    {% set wipe_max_x = vars.wiper_center_x + 5 %}

    {% for i in range(wipe_count) %}
        G1 X{wipe_min_x} F{wipe_speed}
        G1 X{wipe_max_x} F{wipe_speed}
    {% endfor %}

[gcode_macro WIPE_NOZZLE]
gcode:
    {% set vars = printer["gcode_macro BRUSH_VARS"] %}
    {% set travel_speed = 18000 %}

    SAVE_GCODE_STATE NAME=wipe_nozzle

    BRUSH_DEPLOY

    G90
    G1 X{vars.wiper_center_x} Y{vars.center_y - 10} F{travel_speed}
    G1 Y{vars.center_y} F{travel_speed}

    _WIPE_NOZZLE_PATTERN

    # Back out before rack
    G1 Y{vars.center_y - 10} F{travel_speed}

    BRUSH_RACK_HOME

    RESTORE_GCODE_STATE NAME=wipe_nozzle MOVE=1 MOVE_SPEED=180


[gcode_macro _BRUSH_NOZZLE_PATTERN]
gcode:
    {% set vars = printer["gcode_macro BRUSH_VARS"] %}
    {% set wipe_speed = 8000 %}
    {% set brush_cx = vars.brush_center_x %}
    {% set brush_cy = vars.center_y %}
    {% set y_drop = 4.5 %}
    {% set x_reach = 15 %}
    {% set x_mid = x_reach / 2 %}
    {% set x_offsets = [0, 2, -2, 4, -4] %}
    {% set x_sweep = 17.5 %}

    {% for x_off in x_offsets %}
        {% set cx = brush_cx + x_off %}

        # Forward pass (1 -> 10)
        G1 X{cx}           Y{brush_cy}          F{wipe_speed}
        G1 X{cx + x_reach} Y{brush_cy}          F{wipe_speed}
        G1 X{cx + x_reach} Y{brush_cy - y_drop} F{wipe_speed}
        G1 X{cx + x_mid}   Y{brush_cy}          F{wipe_speed}
        G1 X{cx}           Y{brush_cy - y_drop} F{wipe_speed}
        G1 X{cx}           Y{brush_cy}          F{wipe_speed}
        G1 X{cx - x_reach} Y{brush_cy}          F{wipe_speed}
        G1 X{cx - x_reach} Y{brush_cy - y_drop} F{wipe_speed}
        G1 X{cx - x_mid}   Y{brush_cy}          F{wipe_speed}
        G1 X{cx}           Y{brush_cy - y_drop} F{wipe_speed}

        # Reverse pass (10 -> 1)
        G1 X{cx - x_mid}   Y{brush_cy}          F{wipe_speed}
        G1 X{cx - x_reach} Y{brush_cy - y_drop} F{wipe_speed}
        G1 X{cx - x_reach} Y{brush_cy}          F{wipe_speed}
        G1 X{cx}           Y{brush_cy}          F{wipe_speed}
        G1 X{cx}           Y{brush_cy - y_drop} F{wipe_speed}
        G1 X{cx + x_mid}   Y{brush_cy}          F{wipe_speed}
        G1 X{cx + x_reach} Y{brush_cy - y_drop} F{wipe_speed}
        G1 X{cx + x_reach} Y{brush_cy}          F{wipe_speed}
        G1 X{cx}           Y{brush_cy}          F{wipe_speed}

    {% endfor %}

    # Sweep passes: C -> R -> L, then advance 1mm and repeat R -> L four more times
    # Initial C, R, L pass
    G1 X{brush_cx}            Y{brush_cy}          F{wipe_speed}
    G1 X{brush_cx + x_sweep}  Y{brush_cy}          F{wipe_speed}
    G1 X{brush_cx - x_sweep}  Y{brush_cy}          F{wipe_speed}

    # 4x advance 1mm forward (deeper into brush) then R -> L
    {% for i in range(4) %}
        {% set y_adv = brush_cy - (i + 1) %}
        G1 X{brush_cx + x_sweep} Y{y_adv} F{wipe_speed}
        G1 X{brush_cx - x_sweep} Y{y_adv} F{wipe_speed}
    {% endfor %}

[gcode_macro BRUSH_NOZZLE]
gcode:
    {% set vars = printer["gcode_macro BRUSH_VARS"] %}
    {% set travel_speed = 18000 %}

    SAVE_GCODE_STATE NAME=brush_nozzle

    BRUSH_DEPLOY

    G90
    G1 X{vars.brush_center_x} Y{vars.center_y - 10} F{travel_speed}
    G1 Y{vars.center_y} F{travel_speed}

    _BRUSH_NOZZLE_PATTERN

    # Back out before rack
    G1 Y{vars.center_y - 10} F{travel_speed}

    BRUSH_RACK_HOME
    
    RESTORE_GCODE_STATE NAME=brush_nozzle MOVE=1 MOVE_SPEED=180

[gcode_macro CLEAN_NOZZLE]
gcode:
    {% set vars = printer["gcode_macro BRUSH_VARS"] %}
    {% set travel_speed = 18000 %}

    SAVE_GCODE_STATE NAME=clean_nozzle

    BRUSH_DEPLOY

    # Wipe pattern
    G90
    G1 X{vars.wiper_center_x} Y{vars.center_y - 10} F{travel_speed}
    G1 Y{vars.center_y} F{travel_speed}

    _WIPE_NOZZLE_PATTERN

    # Back out before moving to brush
    G1 Y{vars.center_y - 10} F{travel_speed}

    # Brush pattern
    G1 X{vars.brush_center_x} Y{vars.center_y - 10} F{travel_speed}
    G1 Y{vars.center_y} F{travel_speed}

    _BRUSH_NOZZLE_PATTERN

    # Back out before rack
    G1 Y{vars.center_y - 10} F{travel_speed}

    BRUSH_RACK_HOME

    RESTORE_GCODE_STATE NAME=clean_nozzle MOVE=1 MOVE_SPEED=180

[gcode_macro PURGE_AND_CLEAN_NOZZLE]
gcode:
    {% set vars = printer["gcode_macro BRUSH_VARS"] %}
    {% set travel_speed = 18000 %}
    {% set purge_x = vars.wiper_center_x - 10 %}

    SAVE_GCODE_STATE NAME=purge_and_clean

    BRUSH_DEPLOY

    # Move to purge position
    G90
    G1 X{purge_x} Y{vars.center_y - 10} F{travel_speed}
    G1 Y{vars.center_y} F{travel_speed}

   # Purge
    M83
    G1 E20 F300

    # Dwell to let pressure equalize
    G4 P1000

    # Retract enough to pull filament back from tip
    G1 E-2 F1800

    # Dwell to let retract take effect before moving
    G4 P500

    RESTORE_GCODE_STATE NAME=purge_and_clean

    # Hand off to clean — it handles deploy, patterns, rack, and return
    CLEAN_NOZZLE